
{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
    <aside class="auth-visual photo-register">
        <div class="auth-visual-content">
            <h2>Welcome to Smarter Support</h2>
            <p>Create your account to raise issues quickly and keep your support history organized.</p>
            <div class="auth-chip-row">
                <span class="auth-chip">Easy Signup</span>
                <span class="auth-chip">Attachment Support</span>
                <span class="auth-chip">Status Tracking</span>
            </div>
        </div>
    </aside>
    <div class="card auth-card">
        <h2>Create Customer Account</h2>
        <form method="post" class="form-grid">
            <label>Name
                <input type="text" name="name" required>
            </label>
            <label>Email
                <input type="email" name="email" required>
            </label>
            <label>Password
                <input type="password" name="password" minlength="6" required>
            </label>
            <label>Confirm Password
                <input type="password" name="confirm_password" minlength="6" required>
            </label>
            <button type="submit" class="btn">Register</button>
        </form>
        <p class="muted-note auth-footnote">Already registered? <a href="{{ url_for('customer_login') }}">Login</a></p>
    </div>
</section>
{% endblock %}
