
{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
    <aside class="auth-visual photo-security">
        <div class="auth-visual-content">
            <h2>Set a New Password</h2>
            <p>Choose a strong password and keep your account secure.</p>
            <div class="auth-chip-row">
                <span class="auth-chip">Minimum 6 chars</span>
                <span class="auth-chip">Encrypted Storage</span>
                <span class="auth-chip">Safe Login</span>
            </div>
        </div>
    </aside>
    <div class="card auth-card">
        <h2>Reset Password</h2>
        <form method="post" class="form-grid">
            <label>New Password
                <input type="password" name="password" minlength="6" required>
            </label>
            <label>Confirm New Password
                <input type="password" name="confirm_password" minlength="6" required>
            </label>
            <button type="submit" class="btn">Reset Password</button>
        </form>
    </div>
</section>
{% endblock %}
